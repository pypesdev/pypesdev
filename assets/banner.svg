<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-labelledby="title desc">
  <title id="title">Pypes LLC</title>
  <desc id="desc">Open-source software for finding jobs, starting businesses, and reaching FIRE.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111a3a"/>
      <stop offset="100%" stop-color="#1b0e3a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1f2a55" stroke-width="0.6"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.55"/>

  <g opacity="0.7">
    <circle cx="1080" cy="80"  r="2" fill="#67e8f9"/>
    <circle cx="1180" cy="160" r="1.5" fill="#c4b5fd"/>
    <circle cx="980"  cy="240" r="1.8" fill="#f9a8d4"/>
    <circle cx="120"  cy="60"  r="1.6" fill="#67e8f9"/>
    <circle cx="220"  cy="280" r="1.2" fill="#c4b5fd"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" filter="url(#glow)">
    <text x="60" y="120" font-size="84" font-weight="800" fill="url(#neon)" letter-spacing="-2">
      pypes<tspan fill="#f472b6">.</tspan>dev
    </text>
    <text x="64" y="170" font-size="20" fill="#94a3b8" letter-spacing="6">
      OPEN  SOURCE  ·  JOBS  ·  BUSINESS  ·  FIRE
    </text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">
    <rect x="60" y="210" width="640" height="76" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <circle cx="80"  cy="226" r="5" fill="#ef4444"/>
    <circle cx="98"  cy="226" r="5" fill="#f59e0b"/>
    <circle cx="116" cy="226" r="5" fill="#22c55e"/>
    <text x="80" y="260"><tspan fill="#22d3ee">$</tspan> <tspan fill="#a78bfa">pypes</tspan> <tspan fill="#f472b6">--mission</tspan> <tspan fill="#f8fafc">"help people escape the 9–5"</tspan></text>
    <text x="80" y="278"><tspan fill="#64748b">→</tspan> <tspan fill="#22c55e">building</tspan> <tspan fill="#f8fafc">tools for jobs · businesses · FIRE</tspan></text>
  </g>

  <path d="M0 305 Q 320 280 640 305 T 1280 305" fill="none" stroke="url(#line)" stroke-width="2"/>
</svg>
